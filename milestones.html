<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长里程碑 - 橙子的成长足迹</title>
    <!-- 引入全局基础样式 -->
    <link rel="stylesheet" href="css/base.css">
    <!-- 引入里程碑页面的专属样式 -->
    <link rel="stylesheet" href="css/milestones.css">
</head>
<body>
    <header class="page-header">
        <h1>成长里程碑</h1>
        <p>欢迎来到橙子的每一个“第一次”</p>
        <a href="index.html" class="back-to-home">← 返回首页</a>
    </header>

    <main class="milestones-container">
        <!-- 里程碑 1: 第一次翻身 (使用你的本地图片) -->
        <article class="milestone-item">
            <img src="First_images/first-rolling.webp" alt="橙子的第一次翻身">
            <div class="milestone-info">
                <h3>第一次翻身</h3>
                <time datetime="2023-12-12">2023年12月12日</time>
                <p>橙子的第一次翻身，还是粑粑麻麻的领证纪念日~</p>
            </div>
        </article>

        <!-- 里程碑 2: 第一次吃辅食 (视频) -->
        <article class="milestone-item">
            <!-- 使用 <video> 标签，controls 属性会显示播放/暂停按钮 -->
            <div class="video-wrapper">
                <video controls poster="First_images/第一口辅食.jpg">
                    <source src="First_images/第一口辅食.mp4" type="video/mp4">
                    您的浏览器不支持视频播放。
                </video>
            </div>
            <div class="milestone-info">
                <h3>第一次吃辅食</h3>
                <time datetime="2023-12-28">2023年12月28日</time>
                <p>米粉，橙子的第一口辅食，吃的狼吞虎咽，是吃货没错了~</p>
            </div>
        </article>

        <!-- 里程碑 3: 第一次走路 -->
        <article class="milestone-item">
            <!-- 使用 <video> 标签，controls 属性会显示播放/暂停按钮 -->
            <div class="video-wrapper">
                <video controls poster="First_images/第一次走路.jpg">
                    <source src="First_images/第一次走路.mp4" type="video/mp4">
                    您的浏览器不支持视频播放。
                </video>
            </div>
            <div class="milestone-info">
                <h3>第一次走路</h3>
                <time datetime="2024-08-01">2024年08月01日</time>
                <p>过完周岁没两天，橙子选择放开双手，走路了~</p>
            </div>
        </article>

        <!-- 你可以继续添加更多的里程碑项目... -->

    </main>
</body>
</html>
